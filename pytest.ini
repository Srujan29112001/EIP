[pytest]
# Pytest configuration for EIP testing suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum version
minversion = 7.0

# Add options
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short
    --cov=backend
    --cov=agents
    --cov=data_pipeline
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    requires_api_keys: marks tests that require API keys
    unit: marks tests as unit tests

# Asyncio configuration
asyncio_mode = auto

# Coverage configuration
[coverage:run]
source = backend,agents,data_pipeline
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
