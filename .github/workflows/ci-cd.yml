name: EIP CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ===== LINTING & CODE QUALITY =====
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy isort

      - name: Run Black (code formatting)
        run: black --check backend/ agents/ data_pipeline/

      - name: Run Flake8 (linting)
        run: flake8 backend/ agents/ data_pipeline/ --max-line-length=120

      - name: Run isort (import sorting)
        run: isort --check-only backend/ agents/ data_pipeline/

      - name: Run MyPy (type checking)
        run: mypy backend/ --ignore-missing-imports

  # ===== UNIT TESTS =====
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: eip_user
          POSTGRES_PASSWORD: eip_password
          POSTGRES_DB: eip_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_complete.txt

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://eip_user:eip_password@localhost:5432/eip_test_db
          REDIS_HOST: localhost
          MONGODB_URL: mongodb://localhost:27017
        run: |
          pytest tests/unit/ -v -m "not requires_api_keys" --cov=backend --cov=agents --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # ===== INTEGRATION TESTS =====
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: eip_user
          POSTGRES_PASSWORD: eip_password
          POSTGRES_DB: eip_test_db
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/test_password
        ports:
          - 7687:7687

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements_complete.txt

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://eip_user:eip_password@localhost:5432/eip_test_db
          REDIS_HOST: localhost
          MONGODB_URL: mongodb://localhost:27017
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test_password
        run: |
          pytest tests/integration/ -v -m "not requires_api_keys"

  # ===== SECURITY SCANNING =====
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install safety bandit

      - name: Run Safety (dependency check)
        run: safety check --json

      - name: Run Bandit (security linting)
        run: bandit -r backend/ agents/ -f json -o bandit-report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json

  # ===== BUILD DOCKER IMAGES =====
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/eip-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/eip-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/eip-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/eip-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== DEPLOY TO STAGING =====
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to staging
        run: |
          kubectl set image deployment/eip-backend \
            eip-backend=${{ secrets.DOCKER_USERNAME }}/eip-backend:${{ github.sha }} \
            -n eip-staging

          kubectl set image deployment/eip-frontend \
            eip-frontend=${{ secrets.DOCKER_USERNAME }}/eip-frontend:${{ github.sha }} \
            -n eip-staging

          kubectl rollout status deployment/eip-backend -n eip-staging
          kubectl rollout status deployment/eip-frontend -n eip-staging

  # ===== DEPLOY TO PRODUCTION =====
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://eip-platform.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to production
        run: |
          kubectl set image deployment/eip-backend \
            eip-backend=${{ secrets.DOCKER_USERNAME }}/eip-backend:${{ github.sha }} \
            -n eip-production

          kubectl set image deployment/eip-frontend \
            eip-frontend=${{ secrets.DOCKER_USERNAME }}/eip-frontend:${{ github.sha }} \
            -n eip-production

          kubectl rollout status deployment/eip-backend -n eip-production
          kubectl rollout status deployment/eip-frontend -n eip-production

      - name: Run smoke tests
        run: |
          curl -f https://eip-platform.com/health || exit 1

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'EIP Production deployment completed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # ===== E2E TESTS (POST-DEPLOYMENT) =====
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements_complete.txt

      - name: Run E2E tests against staging
        env:
          TEST_BASE_URL: https://staging.eip-platform.com
        run: |
          pytest tests/e2e/ -v --base-url=$TEST_BASE_URL
